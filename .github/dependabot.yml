version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7 # skip versions published < 7 days ago; security advisories bypass this
    groups:
      python-minor-patch:
        update-types: ["minor", "patch"] # majors stay individual PRs
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
