name: CI

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Jobs run in parallel: small suite, fastest wall-clock feedback.
  # Runs the same hooks contributors run locally (hygiene, prettier, schema
  # validation — plus ruff/mypy, which lint/typecheck also run from the locked
  # env; the overlap is accepted to keep one hook config exercised in CI).
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true
      - run: uv sync --locked --all-extras --group dev
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}
      - run: uv run pre-commit run --all-files --show-diff-on-failure

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true
      - run: uv sync --locked --all-extras --group dev
      # Local plugins must never enter the committed manifests (see README
      # plugin guide): fail if a plugin or direct-git dependency appears.
      - run: |
          if grep -nE '"researchkit-plugin-|@ git\+' pyproject.toml; then
            echo "::error::plugin/git dependency in core pyproject.toml — install plugins venv-only (README: Developing against a researchkit checkout)"
            exit 1
          fi
      # Check mode only. CI verifies; it never rewrites code.
      - run: uv run ruff check --output-format=github .
      - run: uv run ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true
      - run: uv sync --locked --all-extras --group dev
      - run: uv run mypy src

  test:
    runs-on: ubuntu-latest
    strategy:
      # Full cross-version signal: one leg failing doesn't cancel the rest.
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - run: uv sync --locked --all-extras --group dev
      # Suffixed data file: pytest-cov merges its own pieces into COVERAGE_FILE,
      # and `coverage combine` in the coverage job only picks up .coverage.* files.
      # --cov-fail-under=0 disables the per-leg gate (pytest-cov otherwise
      # inherits fail_under from pyproject): a leg skipping version-specific
      # branches must not fail alone — the coverage job gates ONCE, combined.
      - run: uv run pytest --cov --cov-fail-under=0
        env:
          COVERAGE_FILE: .coverage.${{ matrix.python-version }}
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-${{ matrix.python-version }}
          path: .coverage*
          include-hidden-files: true
          if-no-files-found: error

  coverage:
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          enable-cache: true
      - run: uv sync --locked --all-extras --group dev
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: coverage-*
          merge-multiple: true
      # Combine ALL legs, then gate ONCE (fail_under lives in pyproject.toml).
      - run: uv run coverage combine
      - run: uv run coverage report

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  # THE required check. Mark only this job as required in branch rules.
  all-checks-passed:
    runs-on: ubuntu-latest
    needs: [pre-commit, lint, typecheck, test, coverage, web]
    # Load-bearing: without always(), a failed dependency SKIPS this job,
    # and a skipped required check counts as SUCCESS.
    if: always()
    steps:
      - name: Fail if any needed job did not succeed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') || contains(needs.*.result, 'skipped') }}" == "true" ]]; then
            echo "::error::A required job failed, was cancelled, or was skipped."
            exit 1
          fi
          echo "All checks passed."
